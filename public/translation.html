<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignLink - Live Translation</title>
    <!-- Reusing existing styles -->
    <link rel="stylesheet" href="style.css">
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;800&display=swap"
        rel="stylesheet">

    <!-- specific styles for translation page -->
    <style>
        .translation-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            width: 100vw;
            position: relative;
            overflow: auto;
            padding: 20px 20px 110px;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        .translation-main {
            width: min(1200px, 96vw);
            display: grid;
            grid-template-columns: 1.4fr 1fr; /* Two column layout */
            gap: 24px;
            align-items: start;
            margin: 0 auto;
            padding-top: 60px;
        }

        .video-section {
            width: 100%;
        }

        .info-side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .info-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-header h3 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }

        .card-header .material-icons {
            color: #3b82f6;
        }

        .card-body {
            padding: 20px;
            flex: 1;
        }

        .prediction-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: #3b82f6;
            text-align: center;
            font-family: 'Outfit', sans-serif;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
        }

        /* Result Overlay over Camera */
        .result-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.85);
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 85%;
            text-align: center;
            z-index: 100;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }

        body.voice-mode-active .result-overlay {
            display: none !important;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
            transition: background 0.3s;
            z-index: 200;
            font-size: 0.9rem;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Video Container */
        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain !important;
            transform: scaleX(-1);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain !important;
            transform: scaleX(-1);
            pointer-events: none;
        }

        /* Speech Container Right Panel Mode */
        .speech-container.right-sidebar-mode {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: none; /* Initially hidden */
            flex-direction: column;
            overflow: hidden;
        }

        body.voice-mode-active .speech-container.right-sidebar-mode {
            display: flex;
        }

        /* Hide Sign Result Card in Voice Mode if both modes are separate */
        body.voice-mode-active .sign-result-card {
            display: none;
        }

        .speech-caption-log-right {
            max-height: 200px;
            overflow-y: auto;
            color: #e2e8f0;
            font-size: 0.95rem;
            line-height: 1.5;
            padding: 5px;
            margin-bottom: 20px;
        }

        .speech-caption-line {
            margin-bottom: 10px;
            padding-left: 10px;
            border-left: 2px solid #3b82f6;
        }

        .sign-cards-area-right {
            width: 100%;
            height: 280px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            overflow-y: auto;
            padding: 10px;
            align-content: flex-start;
        }

        .placeholder-msg {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.2);
            font-style: italic;
            font-size: 0.9rem;
        }

        .control-bar {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            bottom: 24px;
            z-index: 210;
        }

        /* Responsive */
        @media (max-width: 980px) {
            .translation-main {
                grid-template-columns: 1fr;
                width: 94vw;
            }
            
            .info-side-panel {
                order: 2;
            }
        }

        @media (max-width: 600px) {
            .translation-container {
                padding: 10px;
            }
            .translation-main {
                padding-top: 80px;
            }
            .video-container {
                aspect-ratio: 4 / 3;
            }
            .prediction-text {
                font-size: 1.4rem;
            }
            .sign-cards-area-right {
                height: 200px;
            }
            .back-btn span:last-child {
                display: none;
            }
            .back-btn {
                padding: 10px;
                border-radius: 50%;
            }
        }
</style>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <!-- TF.js for future model integration if needed -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
</head>

<body>

    <a href="index.html" class="back-btn">
        <span class="material-icons">arrow_back</span>
        Back to Home
    </a>

    <div class="translation-container">

        <div class="translation-main">

            <!-- Left Side: Camera Area -->
            <div class="video-section">
                <div id="sign-view" class="video-container">
                    <video id="input-video" autoplay playsinline muted></video>
                    <canvas id="output-canvas"></canvas>

                    <!-- Camera Off Placeholder -->
                    <div id="camera-off-placeholder"
                        style="display: none; flex-direction: column; align-items: center; justify-content: center; position: absolute; top:0; left:0; width:100%; height:100%; background: #000; z-index: 10;">
                        <span class="material-icons" style="font-size: 64px; color: #555;">videocam_off</span>
                        <p style="color: #777; margin-top: 10px;">Camera is Off</p>
                    </div>

                    <!-- Voice Mode Subtitles (Floating if needed, but primary log is on right) -->
                    <div class="voice-subtitles" id="voice-subtitles"></div>

                    <!-- Sign Mode Result Overlay -->
                    <div class="result-overlay">
                        <span id="stt-result">Translated Text Will Appear Here...</span>
                    </div>

                    <!-- Spelling Overlay (Top Left) -->
                    <div id="spelling-overlay" style="
                        position: absolute;
                        top: 20px;
                        left: 20px;
                        background: rgba(0, 0, 0, 0.8);
                        padding: 10px 20px;
                        border-radius: 10px;
                        display: none; /* Hidden by default */
                        z-index: 100;
                        pointer-events: none;
                        ">
                        <span id="spelling-text" style="
                            color: white;
                            font-size: 2rem;
                            font-weight: bold;
                            font-family: 'Outfit', sans-serif;
                            letter-spacing: 2px;
                        "></span>
                    </div>
                </div>
            </div>

            <!-- Right Side: Info Panel -->
            <div class="info-side-panel">
                
                <!-- Speech HUD (Shown in voice mode) -->
                <div id="speech-panel" class="speech-container right-sidebar-mode">
                    <div class="card-header">
                        <span class="material-icons" style="color: #3b82f6;">mic</span>
                        <h3 id="listening-text">Listening...</h3>
                    </div>
                    <div class="card-body">
                        <div id="speech-caption-log" class="speech-caption-log-right">
                            <div class="speech-caption-line">Speech captions will appear here.</div>
                        </div>
                        <div class="sign-cards-area-right">
                            <!-- JS will inject cards here -->
                            <div class="placeholder-msg">Sign Cards will appear here.</div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Controls -->
        <div class="control-bar">
            <!-- Camera Toggle -->
            <button id="cam-btn" class="control-btn" title="Toggle Camera">
                <span class="material-icons">videocam</span>
            </button>

            <!-- TTS Toggle -->
            <button id="tts-btn" class="control-btn" title="Toggle Text-to-Speech">
                <span class="material-icons">volume_up</span>
            </button>

            <!-- Language Select -->
            <div style="position: relative; margin: 0 10px;">
                <select id="lang-select" style="
                    background: rgba(255,255,255,0.1); 
                    color: white; 
                    border: 1px solid rgba(255,255,255,0.2); 
                    padding: 10px 15px; 
                    border-radius: 20px; 
                    font-family: 'Inter', sans-serif;
                    cursor: pointer;
                    outline: none;
                ">
                    <option value="ISL" style="background: #1e293b;">ISL (Indian)</option>
                    <option value="ASL" style="background: #1e293b;">ASL (American)</option>
                </select>
            </div>

            <!-- Sign/Voice Mode Toggle -->
            <button id="sign-voice-toggle" class="control-btn" title="Switch between Sign and Voice Mode">
                <span class="material-icons">pan_tool</span>
            </button>
        </div>

    </div>

    <script src="translation.js?v=7"></script>
</body>

</html>
