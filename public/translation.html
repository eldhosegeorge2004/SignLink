<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignLink - Live Translation</title>
    <!-- Reusing existing styles -->
    <link rel="stylesheet" href="style.css">
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;800&display=swap"
        rel="stylesheet">

    <!-- specific styles for translation page -->
    <style>
        .translation-container {
            padding: 0;
            gap: 0;
            overflow: hidden;
            height: 100dvh;
            min-height: 100dvh;
            justify-content: flex-start;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            width: 100vw;
            position: relative;
        }

        .translation-main {
            width: 100%;
            flex: none;
            height: auto;
            gap: 0;
            display: flex;
            flex-direction: column;
            padding-top: 0;
        }

        .video-section {
            width: 100%;
        }


        /* Result Overlay over Camera */
        .result-overlay {
            position: fixed;
            bottom: 110px; /* Above the pill control bar */
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            background: rgba(13, 20, 36, 0.9);
            padding: 15px 20px;
            border-radius: 30px;
            z-index: 110;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            color: white;
            font-size: 1.1rem;
            display: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .result-overlay:has(#stt-result:not(:empty)) {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        body.voice-mode-active .result-overlay {
            display: none !important;
        }

        /* Remove old desktop grid overrides */
        body.voice-mode-active .translation-main {
            width: 100%;
            grid-template-columns: 1fr;
        }

        .back-btn {
            position: fixed;
            top: 14px;
            left: 14px;
            padding: 10px;
            border-radius: 50%;
            gap: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            color: white;
            transition: background 0.3s;
        }

        .back-btn span:last-child {
            display: none;
        }

        .back-btn .material-icons {
            font-size: 28px;
            margin-right: 2px; /* Visual centering for chevron */
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Video Container - Full Screen */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            border-radius: 0;
            border: none;
            margin: 0;
            background: #000;
            z-index: 1; /* Background layer */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: cover !important; /* Forces vertical full-screen crop */
            transform: scaleX(-1);
            position: absolute;
            top: 0;
            left: 0;
        }

        canvas {
            pointer-events: none;
        }

        /* Speech Container - Anchored at the top like video call */
        .speech-container.caption-log-panel {
            position: fixed !important;
            top: calc(env(safe-area-inset-top) + 8px) !important;
            left: 12px !important;
            right: 12px !important;
            bottom: auto !important;
            transform: none !important;
            width: auto !important;
            max-height: min(42vh, calc(100dvh - 180px));
            border-radius: 24px !important;
            background: rgba(13, 20, 36, 0.78) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            z-index: 105;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            opacity: 1;
            visibility: hidden;
        }

        .speech-container .caption-panel-content {
            padding: 12px;
            gap: 10px;
        }

        .speech-container .caption-section-header,
        .speech-container .sign-cards-panel-header {
            padding: 0 4px;
        }

        body.voice-mode-active .speech-container.caption-log-panel {
            display: flex !important;
            visibility: visible !important;
        }

        body.voice-mode-active .speech-container.caption-log-panel.awake {
            opacity: 1;
        }

        .speech-caption-log {
            max-height: 110px;
            overflow-y: auto;
            padding: 4px 8px;
            margin: 0;
            border: none;
            font-size: 0.9rem !important;
            color: #e6edf3;
            line-height: 1.4;
            scrollbar-width: none;
            -ms-overflow-style: none;
            display: flex !important;
        }

        .speech-caption-log::-webkit-scrollbar {
            display: none;
        }

        body.voice-mode-active .speech-caption-log {
            display: flex !important;
        }

        .caption-log-window.collapsed .speech-caption-log {
            display: none !important;
        }

        .placeholder-msg {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.2);
            font-style: italic;
            font-size: 0.9rem;
        }

        /* Result Overlay over Camera - Moved to base styles */
        body.voice-mode-active .result-overlay {
            display: none !important;
        }

        .control-bar {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            bottom: 15px;
            z-index: 210;
            display: flex;
            gap: 10px;
            padding: 6px 15px;
            flex-direction: row;
            flex-wrap: nowrap;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: fit-content;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            max-width: 95vw;
        }

        /* Control button styling */
        .control-btn {
            width: 44px;
            height: 44px;
            min-width: 44px;
            min-height: 44px;
            padding: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        #lang-select {
            background: rgba(255,255,255,0.1); 
            color: white; 
            border: 1px solid rgba(255,255,255,0.2); 
            padding: 8px 12px !important;
            font-size: 0.75rem !important;
            border-radius: 16px !important;
            min-width: 100px;
            max-width: 140px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            outline: none;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .control-btn .material-icons {
            font-size: 28px;
        }




        /* Remove old desktop grid overrides */
        body.voice-mode-active .translation-main {
            width: 100%;
            grid-template-columns: 1fr;
        }

        body.voice-mode-active .video-container {
            grid-column: auto;
            grid-row: auto;
        }

        body:not(.voice-mode-active) .speech-container {
            display: none !important;
        }

        /* Spelling overlay: smaller on mobile */
        #spelling-overlay {
            top: 14px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            padding: 6px 16px !important;
            border-radius: 8px !important;
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            display: none; /* Hidden by default */
            z-index: 100;
            pointer-events: none;
        }

        #spelling-text {
            color: white;
            font-size: 1.4rem !important;
            font-weight: bold;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 3px !important;
        }


        /* Extra small devices (< 360px) */
        @media (max-width: 360px) {
            .control-bar {
                gap: 6px;
                bottom: 8px;
            }

            .control-btn {
                width: 40px;
                height: 40px;
                min-width: 40px;
                min-height: 40px;
            }

            #lang-select {
                font-size: 0.65rem !important;
                padding: 6px 10px !important;
                min-width: 90px;
            }

            .back-btn {
                width: 40px;
                height: 40px;
                padding: 8px;
            }

            .back-btn .material-icons {
                font-size: 20px;
            }

            .speech-caption-log {
                font-size: 0.75rem !important;
            }

            .speech-container .sign-cards-panel-window {
                min-height: 144px;
            }
        }
</style>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
</head>

<body>

    <a href="index.html?mode=translation" class="back-btn">
        <span class="material-icons">chevron_left</span>
        <span>Back to Home</span>
    </a>

    <div class="translation-container">

        <div class="translation-main">

            <!-- Left Side: Camera Area -->
            <div class="video-section">
                <div id="sign-view" class="video-container">
                    <video id="input-video" autoplay playsinline muted></video>
                    <canvas id="output-canvas"></canvas>

                    <!-- Camera Off Placeholder -->
                    <div id="camera-off-placeholder"
                        style="display: none; flex-direction: column; align-items: center; justify-content: center; position: absolute; top:0; left:0; width:100%; height:100%; background: #000; z-index: 10;">
                        <span class="material-icons" style="font-size: 64px; color: #555;">videocam_off</span>
                        <p style="color: #777; margin-top: 10px;">Camera is Off</p>
                    </div>


                    <!-- Sign Mode Result Overlay -->
                    <div class="result-overlay">
                        <span id="stt-result"></span>
                    </div>

                    <!-- Spelling Overlay (Top Left) -->
                    <div id="spelling-overlay" style="
                        position: absolute;
                        top: 20px;
                        left: 20px;
                        background: rgba(0, 0, 0, 0.8);
                        padding: 10px 20px;
                        border-radius: 10px;
                        display: none; /* Hidden by default */
                        z-index: 100;
                        pointer-events: none;
                        ">
                        <span id="spelling-text" style="
                            color: white;
                            font-size: 2rem;
                            font-weight: bold;
                            font-family: 'Outfit', sans-serif;
                            letter-spacing: 2px;
                        "></span>
                    </div>
                </div>
            </div>


            <!-- Speech HUD (Shown in voice mode) -->
            <div id="speech-panel" class="speech-container caption-log-panel visible awake">
                <div class="caption-panel-content">
                    <div id="caption-log-window" class="caption-log-window">
                        <div class="caption-section-header">
                            <span>Captions</span>
                            <button id="captionToggleBtn" class="section-toggle-btn" type="button" aria-expanded="true" aria-controls="speech-caption-log" title="Hide captions">
                                <span class="material-icons">expand_more</span>
                            </button>
                        </div>
                        <div id="speech-caption-log" class="speech-caption-log caption-log-list">
                            <div class="caption-log-empty">Speech captions will appear here.</div>
                        </div>
                    </div>
                    <div id="sign-cards-panel-window" class="sign-cards-panel-window">
                        <div class="sign-cards-panel-header">
                            <span>Sign Cards Translation</span>
                            <button id="signCardsToggleBtn" class="section-toggle-btn" type="button" aria-expanded="true" aria-controls="sign-cards-output" title="Hide sign cards">
                                <span class="material-icons">expand_more</span>
                            </button>
                        </div>
                        <div id="sign-cards-output" class="prediction-sign-cards-container active">
                            <div class="placeholder-msg">Sign cards translation will appear here.</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>


        <!-- Controls -->
        <div class="control-bar">
            <!-- Camera Toggle -->
            <button id="cam-btn" class="control-btn" title="Toggle Camera">
                <span class="material-icons">videocam</span>
            </button>

            <!-- TTS Toggle -->
            <button id="tts-btn" class="control-btn" title="Toggle Text-to-Speech">
                <span class="material-icons">volume_up</span>
            </button>

            <!-- Language Select -->
            <div style="position: relative;">
                <select id="lang-select">
                    <option value="ISL" style="background: #1e293b;">ISL (Indian)</option>
                    <option value="ASL" style="background: #1e293b;">ASL (American)</option>
                </select>
            </div>

            <!-- Sign/Voice Mode Toggle -->
            <button id="sign-voice-toggle" class="control-btn" title="Switch between Sign and Voice Mode">
                <span class="material-icons">pan_tool</span>
            </button>
        </div>

    </div>

    <script src="capacitor.js"></script>
    <script src="capacitor-tts.js"></script>
    <script src="translation.js?v=8"></script>
</body>

</html>
