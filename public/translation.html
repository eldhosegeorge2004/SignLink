<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignLink - Live Translation</title>
    <!-- Reusing existing styles -->
    <link rel="stylesheet" href="style.css">
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;800&display=swap"
        rel="stylesheet">

    <!-- specific styles for translation page -->
    <style>
        .translation-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100vw;
            position: relative;
            overflow: auto;
            padding: 20px;
            gap: 30px;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
            transition: background 0.3s;
            z-index: 200;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Video Container (Sign to Text) */
        .video-container {
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.3);
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain !important;
            transform: scaleX(-1);
            /* Mirror effect */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain !important;
            transform: scaleX(-1);
            pointer-events: none;
        }

        /* Speech to Sign Container */
        .speech-container {
            width: 100%;
            height: 100%;
            display: none;
            /* Hidden by default */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            padding: 40px;
        }

        .speech-container.active {
            display: flex;
        }

        .caption-mic-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.03em;
        }

        .caption-mic-bar .mic-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.7);
        }

        .speech-caption-box {
            width: 100%;
            max-width: 860px;
            min-height: 110px;
            background: rgba(0, 0, 0, 0.72);
            border-radius: 14px;
            padding: 20px 32px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 10px;
        }

        .caption-line {
            font-size: 1.55rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            color: white;
            min-height: 1.9rem;
            line-height: 1.45;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .caption-line.dim {
            color: rgba(255, 255, 255, 0.45);
        }

        .caption-interim {
            color: rgba(255, 255, 255, 0.55);
        }

        /* Bottom Result Overlay */
        .result-overlay {
            position: absolute;
            bottom: 75px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.85);
            padding: 15px 30px;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 85%;
            text-align: center;
            z-index: 100;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .control-bar {
            bottom: 40px;
            /* Adjust from default style.css if needed */
        }
    </style>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <!-- TF.js for future model integration if needed -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
</head>

<body>

    <a href="index.html" class="back-btn">
        <span class="material-icons">arrow_back</span>
        Back to Home
    </a>

    <div class="translation-container">

        <!-- Mode 1: Sign to Text (Default) -->
        <div id="sign-view" class="video-container">
            <video id="input-video" autoplay playsinline muted></video>
            <canvas id="output-canvas"></canvas>

            <!-- Camera Off Placeholder -->
            <div id="camera-off-placeholder"
                style="display: none; flex-direction: column; align-items: center; justify-content: center; position: absolute; top:0; left:0; width:100%; height:100%; background: #000; z-index: 10;">
                <span class="material-icons" style="font-size: 64px; color: #555;">videocam_off</span>
                <p style="color: #777; margin-top: 10px;">Camera is Off</p>
            </div>

            <div class="result-overlay">
                <span id="stt-result">Translated Text Will Appear Here...</span>
            </div>

            <!-- Spelling Overlay (Top Left) -->
            <div id="spelling-overlay" style="
                position: absolute;
                top: 20px;
                left: 20px;
                background: rgba(0, 0, 0, 0.8);
                padding: 10px 20px;
                border-radius: 10px;
                display: none; /* Hidden by default */
                z-index: 100;
                pointer-events: none;
            ">
                <span id="spelling-text" style="
                    color: white;
                    font-size: 2rem;
                    font-weight: bold;
                    font-family: 'Outfit', sans-serif;
                    letter-spacing: 2px;
                "></span>
            </div>
        </div>

        <!-- Mode 2: Speech to Sign -->
        <div id="speech-view" class="speech-container">
            <div class="caption-mic-bar">
                <div class="mic-dot"></div>
                <span id="listening-text">Listening...</span>
            </div>
            <div class="speech-caption-box">
                <div id="caption-line-a" class="caption-line dim"></div>
                <div id="caption-line-b" class="caption-line"></div>
            </div>
        </div>

        <!-- Controls -->
        <div class="control-bar">
            <!-- Camera Toggle -->
            <button id="cam-btn" class="control-btn" title="Toggle Camera">
                <span class="material-icons">videocam</span>
            </button>

            <!-- TTS Toggle -->
            <button id="tts-btn" class="control-btn" title="Toggle Text-to-Speech">
                <span class="material-icons">volume_up</span>
            </button>

            <!-- Language Select -->
            <div style="position: relative; margin: 0 10px;">
                <select id="lang-select" style="
                    background: rgba(255,255,255,0.1); 
                    color: white; 
                    border: 1px solid rgba(255,255,255,0.2); 
                    padding: 10px 15px; 
                    border-radius: 20px; 
                    font-family: 'Inter', sans-serif;
                    cursor: pointer;
                    outline: none;
                ">
                    <option value="ISL" style="background: #1e293b;">ISL (Indian)</option>
                    <option value="ASL" style="background: #1e293b;">ASL (American)</option>
                </select>
            </div>

            <!-- Mode Toggle -->
            <button id="mode-btn" class="control-btn" title="Switch Mode"
                style="width: auto; padding: 0 24px; gap: 10px;">
                <span class="material-icons">swap_horiz</span>
                <span id="mode-text">Switch to Live Speech</span>
            </button>
        </div>

    </div>

    <script src="translation.js?v=5"></script>
</body>

</html>
