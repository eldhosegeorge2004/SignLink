<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignLink - Live Translation</title>
    <!-- Reusing existing styles -->
    <link rel="stylesheet" href="style.css">
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;800&display=swap"
        rel="stylesheet">

    <!-- specific styles for translation page -->
    <style>
        .translation-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100vw;
            position: relative;
            overflow: auto;
            padding: 20px 20px 110px;
            gap: 18px;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        .translation-main {
            width: min(800px, 96vw);
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
            align-items: stretch;
            margin: 0 auto;
        }

        /* Two-column layout when voice mode is active on desktop */
        body.voice-mode-active .translation-main {
            width: min(1400px, 96vw);
            grid-template-columns: 1.2fr 1fr;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
            transition: background 0.3s;
            z-index: 200;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Video Container (Sign to Text) */
        .video-container {
            width: 100%;
            max-width: none;
            aspect-ratio: 16 / 9;
            position: relative;
            left: -10px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.3);
        }

        /* Grid positioning for voice mode on desktop */
        body.voice-mode-active .video-container {
            grid-column: 1;
            grid-row: 1;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain !important;
            transform: scaleX(-1);
            /* Mirror effect */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain !important;
            transform: scaleX(-1);
            pointer-events: none;
        }

        /* Speech to Sign Container */
        .speech-container {
            width: calc(100% - 24px);
            position: absolute;
            bottom: 20px;
            left: 12px;
            display: none;
            flex-direction: column;
            justify-content: flex-start;
            align-items: stretch;
            background: transparent;
            backdrop-filter: none;
            border: none;
            padding: 16px;
            z-index: 150;
        }

        .speech-container.active {
            display: flex;
        }

        /* Desktop voice mode: position as grid item */
        body.voice-mode-active .speech-container {
            position: relative;
            width: 100%;
            bottom: auto;
            left: auto;
            display: flex;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            overflow-y: auto;
            grid-column: 2;
            grid-row: 1;
            flex-direction: column;
            justify-content: flex-start;
            align-items: stretch;
        }

        .listening-indicator {
            font-size: 1rem;
            color: #3b82f6;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); /* Added shadow for legibility */
        }

        .speech-caption-log {
            flex: 1;
            min-height: 100px;
            max-height: 30vh;
            overflow-y: auto;
            border: none;
            background: transparent;
            padding: 5px;
            color: #fff;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: none;
        }

        /* Desktop voice mode: captions as fixed overlay on video */
        body.voice-mode-active .speech-caption-log {
            position: fixed;
            display: block;
            left: 80px;
            top: calc(55% + 30px);
            min-height: auto;
            max-height: 30vh;
            width: 50vw;
            background: transparent;
            padding: 0;
            margin: 0;
            z-index: 100;
            border: none;
            flex: none;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8), 0 4px 12px rgba(0, 0, 0, 0.6);
        }

        body.voice-mode-active .speech-caption-log.show {
            display: block !important;
        }

        .speech-caption-line {
            margin-bottom: 8px;
            line-height: 1.35;
            color: #e2e8f0;
            word-break: break-word;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8), 0 4px 12px rgba(0, 0, 0, 0.6);
        }

        /* Desktop voice mode: styled caption line */
        body.voice-mode-active .speech-caption-line {
            margin-bottom: 6px;
            line-height: 1.4;
            font-size: 0.85rem;
        }

        .sign-cards-area {
            width: 100%;
            max-width: none;
            height: 320px;
            border: none; /* Removed border */
            border-radius: 12px;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            background: transparent; /* Removed background */
            color: rgba(255, 255, 255, 0.3);
            font-size: 1rem;
            overflow-y: auto;
            padding: 10px;
        }

        /* Desktop voice mode: styled sign cards in right panel */
        body.voice-mode-active .sign-cards-area {
            position: relative;
            width: calc(100% + 32px);
            margin: 0 -16px -16px -16px;
            height: auto;
            min-height: auto;
            border-bottom: none;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0 0 12px 12px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 10px;
            background: rgba(15, 23, 42, 0.3);
            padding: 12px 16px;
            font-size: 0.8rem;
            justify-content: flex-start;
            align-items: flex-start;
            top: auto;
            left: auto;
            z-index: auto;
        }

        @media (max-width: 1200px) {
            .video-container {
                left: -6px;
            }
        }

        /* Bottom Result Overlay */
        .result-overlay {
            position: absolute;
            bottom: 75px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.85);
            padding: 15px 30px;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 85%;
            text-align: center;
            z-index: 100;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block; /* Shown by default in sign mode */
        }

        /* Hide entire sign-result HUD in voice mode definitely */
        body.voice-mode-active .result-overlay {
            display: none !important;
        }

        .control-bar {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            bottom: 16px;
            z-index: 210;
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
        }

        /* Control button styling */
        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            padding: 0;
            min-width: 48px;
            min-height: 48px;
            width: 48px;
            height: 48px;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .control-btn .material-icons {
            font-size: 28px;
        }

        /* Subtitles for Voice Mode - Hidden in favor of HUD captions */
        .voice-subtitles {
            display: none !important;
        }

        .listening-indicator {
            font-size: 1.1rem;
            color: #3b82f6;
            margin-bottom: 12px;
            display: none;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8), 0 4px 12px rgba(0, 0, 0, 0.6);
        }

        /* Desktop voice mode: captions overlay on video */
        body.voice-mode-active .listening-indicator {
            position: fixed;
            display: flex;
            left: 80px;
            top: 55%;
            transform: translateY(-100%);
            z-index: 100;
            background: transparent;
            margin: 0;
        }

        body.voice-mode-active .listening-indicator.show {
            display: flex !important;
        }
        
        #listening-text {
            color: #fff;
            opacity: 0.9;
            font-style: italic;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8), 0 4px 12px rgba(0, 0, 0, 0.6);
        }

        body:not(.voice-mode-active) .speech-container {
            display: none !important;
        }

        /* Show captions as overlay in voice mode on desktop */
        @media (min-width: 601px) {
            body.voice-mode-active .listening-indicator {
                display: flex;
            }

            body.voice-mode-active .speech-caption-log {
                display: block;
            }
        }

        @media (max-width: 980px) {
            .translation-main {
                width: 96vw;
            }

            .speech-container {
                max-height: 50vh;
            }

            /* Adjust captions position for tablet */
            body.voice-mode-active .listening-indicator {
                left: 60px;
                top: 50%;
            }

            body.voice-mode-active .speech-caption-log {
                left: 60px;
                top: calc(50% + 25px);
                width: calc(100% - 120px);
            }
        }

        /* ════════════════════════════════════════
           MOBILE — Native App Style (≤600px)
           ════════════════════════════════════════ */
        @media (max-width: 600px) {

            /* Override desktop voice mode layout on mobile */
            body.voice-mode-active .translation-main {
                grid-template-columns: 1fr;
                width: 100%;
            }

            /* Full-screen container — no scroll */
            .translation-container {
                padding: 0;
                gap: 0;
                overflow: hidden;
                height: 100dvh;
                min-height: 100dvh;
                justify-content: flex-start;
                background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
                flex-direction: column;
            }

            /* Single-column grid, camera fills all space */
            .translation-main {
                grid-template-columns: 1fr;
                width: 100%;
                flex: none;
                height: auto;
                gap: 0;
                display: flex;
                flex-direction: column;
            }

            /* Camera fills portion of screen */
            .video-container {
                left: 0;
                width: 100%;
                height: 40vh;
                aspect-ratio: unset;
                border-radius: 0;
                border: none;
                box-shadow: none;
                flex-shrink: 0;
                background: #000;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }

            /* Back button: icon-only circle */
            .back-btn {
                top: 14px;
                left: 14px;
                padding: 10px;
                border-radius: 50%;
                gap: 0;
                background: rgba(0, 0, 0, 0.5);
                backdrop-filter: blur(6px);
                width: 44px;
                height: 44px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .back-btn span:last-child {
                display: none; /* hide "Back to Home" text */
            }

            .back-btn .material-icons {
                font-size: 24px;
            }

            /* Translation result strip — compact */
            .result-overlay {
                bottom: 80px;
                padding: 10px 18px;
                font-size: 0.95rem;
                max-width: 90%;
                border-radius: 30px;
            }

            /* Control bar — fits in one tight row */
            .control-bar {
                bottom: 10px;
                gap: 10px;
                padding: 0 10px;
                display: flex;
                flex-direction: row;
                flex-wrap: nowrap;
                align-items: center;
                justify-content: center;
            }

            /* Control buttons styling for mobile */
            .control-btn {
                width: 44px;
                height: 44px;
                min-width: 44px;
                min-height: 44px;
                padding: 8px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            /* Shrink lang select to be compact */
            #lang-select {
                padding: 8px 12px !important;
                font-size: 0.75rem !important;
                border-radius: 16px !important;
                min-width: 100px;
                max-width: 140px;
            }

            /* Speech panel: captions and sign cards area */
            .speech-container {
                position: relative !important;
                bottom: auto !important;
                left: auto !important;
                right: auto !important;
                width: 100% !important;
                height: auto;
                max-height: 50vh;
                min-height: 0;
                border: none !important;
                background: rgba(30, 41, 59, 0.6);
                backdrop-filter: blur(8px);
                padding: 0 !important;
                box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.3);
                grid-column: auto !important;
                grid-row: auto !important;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                align-items: stretch;
                overflow-y: auto;
                flex: 1;
            }

            body.voice-mode-active .speech-container {
                position: relative !important;
                background: transparent !important;
                backdrop-filter: none !important;
                border: none !important;
            }

            /* Captions in the middle */
            .listening-indicator {
                position: static !important;
                display: none !important;
                left: auto !important;
                top: auto !important;
                z-index: auto;
                margin: 24px 16px 0 16px !important;
                font-size: 0.9rem !important;
                color: #3b82f6;
            }

            body.voice-mode-active .listening-indicator {
                display: flex !important;
            }

            body.voice-mode-active .listening-indicator.show {
                display: flex !important;
            }

            .speech-caption-log {
                max-height: auto;
                min-height: auto;
                position: static !important;
                display: none !important;
                left: auto !important;
                top: auto !important;
                z-index: auto;
                width: 100% !important;
                background: transparent !important;
                padding: 6px 16px 12px 16px !important;
                margin: 0 !important;
                border: none !important;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                font-size: 0.85rem !important;
                color: #e2e8f0;
            }

            body.voice-mode-active .speech-caption-log {
                max-height: auto !important;
                min-height: auto !important;
                display: block !important;
            }

            body.voice-mode-active .speech-caption-log.show {
                display: block !important;
            }

            /* Sign cards area at bottom */
            .sign-cards-area {
                height: auto;
                min-height: 100px;
                max-height: 30vh;
                width: 100% !important;
                margin: 0 !important;
                padding: 12px 16px !important;
                border-top: 1px solid rgba(255, 255, 255, 0.15);
                border-radius: 0 !important;
                background: rgba(15, 23, 42, 0.5);
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
                gap: 6px;
                overflow-y: auto;
            }

            body.voice-mode-active .sign-cards-area {
                width: 100% !important;
                margin: 0 !important;
                border-top: 1px solid rgba(255, 255, 255, 0.15);
                background: rgba(15, 23, 42, 0.5);
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
                gap: 6px;
                padding: 12px 16px;
            }

            /* Spelling overlay: smaller on mobile */
            #spelling-overlay {
                top: 14px !important;
                left: 50% !important;
                transform: translateX(-50%) !important;
                padding: 6px 16px !important;
                border-radius: 8px !important;
            }

            #spelling-text {
                font-size: 1.4rem !important;
                letter-spacing: 3px !important;
            }
        }

        /* Extra small devices (< 360px) */
        @media (max-width: 360px) {
            .control-bar {
                gap: 6px;
                bottom: 8px;
            }

            .control-btn {
                width: 40px;
                height: 40px;
                min-width: 40px;
                min-height: 40px;
            }

            #lang-select {
                font-size: 0.65rem !important;
                padding: 6px 10px !important;
                min-width: 90px;
            }

            .back-btn {
                width: 40px;
                height: 40px;
                padding: 8px;
            }

            .back-btn .material-icons {
                font-size: 20px;
            }

            .listening-indicator {
                margin: 20px 12px 0 12px !important;
                font-size: 0.8rem !important;
            }

            .speech-caption-log {
                padding: 6px 12px 10px 12px !important;
                font-size: 0.75rem !important;
            }

            .sign-cards-area {
                grid-template-columns: repeat(4, 1fr);
                padding: 10px 12px !important;
                gap: 5px;
            }
        }
</style>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <!-- TF.js for future model integration if needed -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
</head>

<body>

    <a href="index.html" class="back-btn">
        <span class="material-icons">arrow_back</span>
        Back to Home
    </a>

    <div class="translation-container">

        <div class="translation-main">

            <!-- Camera Area -->
            <div id="sign-view" class="video-container">
                <video id="input-video" autoplay playsinline muted></video>
                <canvas id="output-canvas"></canvas>

                <!-- Camera Off Placeholder -->
                <div id="camera-off-placeholder"
                    style="display: none; flex-direction: column; align-items: center; justify-content: center; position: absolute; top:0; left:0; width:100%; height:100%; background: #000; z-index: 10;">
                    <span class="material-icons" style="font-size: 64px; color: #555;">videocam_off</span>
                    <p style="color: #777; margin-top: 10px;">Camera is Off</p>
                </div>

                <div class="result-overlay">
                    <span id="stt-result">Translated Text Will Appear Here...</span>
                </div>

                <!-- Voice Mode Subtitles -->
                <div class="voice-subtitles" id="voice-subtitles"></div>

                <!-- Spelling Overlay (Top Left) -->
                <div id="spelling-overlay" style="
                    position: absolute;
                    top: 20px;
                    left: 20px;
                    background: rgba(0, 0, 0, 0.8);
                    padding: 10px 20px;
                    border-radius: 10px;
                    display: none; /* Hidden by default */
                    z-index: 100;
                    pointer-events: none;
                    ">
                    <span id="spelling-text" style="
                        color: white;
                        font-size: 2rem;
                        font-weight: bold;
                        font-family: 'Outfit', sans-serif;
                        letter-spacing: 2px;
                    "></span>
                </div>
            </div>

            <!-- Captions Overlay (shown in voice mode as overlay on video) -->
            <div class="listening-indicator">
                <span class="material-icons" style="font-size: 22px;">mic</span>
                <span id="listening-text">Listening...</span>
            </div>
            <div id="speech-caption-log" class="speech-caption-log">
                <div class="speech-caption-line">Speech captions will appear here.</div>
            </div>

            <!-- Speech Panel (shown in voice mode as separate panel) -->
            <div id="speech-panel" class="speech-container">
                <div class="sign-cards-area">
                    <p>Sign Language Cards Display</p>
                </div>
            </div>

        </div>

        <!-- Controls -->
        <div class="control-bar">
            <!-- Camera Toggle -->
            <button id="cam-btn" class="control-btn" title="Toggle Camera">
                <span class="material-icons">videocam</span>
            </button>

            <!-- TTS Toggle -->
            <button id="tts-btn" class="control-btn" title="Toggle Text-to-Speech">
                <span class="material-icons">volume_up</span>
            </button>

            <!-- Language Select -->
            <div style="position: relative; margin: 0 10px;">
                <select id="lang-select" style="
                    background: rgba(255,255,255,0.1); 
                    color: white; 
                    border: 1px solid rgba(255,255,255,0.2); 
                    padding: 10px 15px; 
                    border-radius: 20px; 
                    font-family: 'Inter', sans-serif;
                    cursor: pointer;
                    outline: none;
                ">
                    <option value="ISL" style="background: #1e293b;">ISL (Indian)</option>
                    <option value="ASL" style="background: #1e293b;">ASL (American)</option>
                </select>
            </div>

            <!-- Sign/Voice Mode Toggle -->
            <button id="sign-voice-toggle" class="control-btn" title="Switch between Sign and Voice Mode">
                <span class="material-icons">pan_tool</span>
            </button>
        </div>

    </div>

    <script src="translation.js?v=7"></script>
</body>

</html>
