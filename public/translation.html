<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignLink - Live Translation</title>
    <!-- Reusing existing styles -->
    <link rel="stylesheet" href="style.css">
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;800&display=swap"
        rel="stylesheet">

    <!-- specific styles for translation page -->
    <style>
        .translation-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100vw;
            position: relative;
            overflow: auto;
            padding: 20px 20px 110px;
            gap: 18px;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        .translation-main {
            width: min(1280px, 96vw);
            display: grid;
            grid-template-columns: 1.45fr 1.15fr;
            gap: 18px;
            align-items: stretch;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
            transition: background 0.3s;
            z-index: 200;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Video Container (Sign to Text) */
        .video-container {
            width: 100%;
            max-width: none;
            aspect-ratio: 16 / 9;
            position: relative;
            left: -10px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.3);
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain !important;
            transform: scaleX(-1);
            /* Mirror effect */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain !important;
            transform: scaleX(-1);
            pointer-events: none;
        }

        /* Speech to Sign Container */
        .speech-container {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: flex-start;
            align-items: stretch;
            background: rgba(15, 23, 42, 0.82);
            border: 1px solid rgba(148, 163, 184, 0.26);
            border-radius: 12px;
            padding: 12px;
            min-height: 0;
        }

        .speech-container.active {
            display: flex;
        }

        .listening-indicator {
            font-size: 1rem;
            color: #3b82f6;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speech-caption-log {
            flex: 1;
            min-height: 140px;
            max-height: 36vh;
            overflow-y: auto;
            border: 1px solid rgba(148, 163, 184, 0.26);
            border-radius: 10px;
            background: rgba(2, 6, 23, 0.55);
            padding: 10px;
            color: #fff;
            font-size: 0.85rem;
        }

        .speech-caption-line {
            margin-bottom: 8px;
            line-height: 1.35;
            color: #e2e8f0;
            word-break: break-word;
        }

        .sign-cards-area {
            width: 100%;
            max-width: none;
            height: 320px;
            margin-top: 10px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            background: rgba(0, 0, 0, 0.2);
            color: rgba(255, 255, 255, 0.3);
            font-size: 1rem;
            overflow-y: auto;
            padding: 10px;
        }

        @media (max-width: 1200px) {
            .video-container {
                left: -6px;
            }
        }

        /* Bottom Result Overlay */
        .result-overlay {
            position: absolute;
            bottom: 75px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.85);
            padding: 15px 30px;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 85%;
            text-align: center;
            z-index: 100;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .control-bar {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            bottom: 16px;
            z-index: 210;
        }

        /* Subtitles for Voice Mode */
        .voice-subtitles {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            max-width: 85%;
            text-align: center;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        @media (max-width: 980px) {
            .translation-main {
                grid-template-columns: 1fr;
            }

            .video-container {
                left: 0;
            }

            .speech-container {
                min-height: 260px;
            }
        }
    </style>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <!-- TF.js for future model integration if needed -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
</head>

<body>

    <a href="index.html" class="back-btn">
        <span class="material-icons">arrow_back</span>
        Back to Home
    </a>

    <div class="translation-container">

        <div class="translation-main">

            <!-- Camera Area -->
            <div id="sign-view" class="video-container">
                <video id="input-video" autoplay playsinline muted></video>
                <canvas id="output-canvas"></canvas>

            <!-- Camera Off Placeholder -->
            <div id="camera-off-placeholder"
                style="display: none; flex-direction: column; align-items: center; justify-content: center; position: absolute; top:0; left:0; width:100%; height:100%; background: #000; z-index: 10;">
                <span class="material-icons" style="font-size: 64px; color: #555;">videocam_off</span>
                <p style="color: #777; margin-top: 10px;">Camera is Off</p>
            </div>

                <div class="result-overlay">
                    <span id="stt-result">Translated Text Will Appear Here...</span>
                </div>

            <!-- Voice Mode Subtitles -->
                <div class="voice-subtitles" id="voice-subtitles"></div>

            <!-- Spelling Overlay (Top Left) -->
                <div id="spelling-overlay" style="
                position: absolute;
                top: 20px;
                left: 20px;
                background: rgba(0, 0, 0, 0.8);
                padding: 10px 20px;
                border-radius: 10px;
                display: none; /* Hidden by default */
                z-index: 100;
                pointer-events: none;
                ">
                    <span id="spelling-text" style="
                    color: white;
                    font-size: 2rem;
                    font-weight: bold;
                    font-family: 'Outfit', sans-serif;
                    letter-spacing: 2px;
                "></span>
                </div>
            </div>

            <!-- Speech Panel (shown in voice mode beside camera) -->
            <div id="speech-panel" class="speech-container">
                <div class="listening-indicator">
                    <span class="material-icons" style="font-size: 22px;">mic</span>
                    <span id="listening-text">Listening...</span>
                </div>
                <div id="speech-caption-log" class="speech-caption-log">
                    <div class="speech-caption-line">Speech captions will appear here.</div>
                </div>
                <div class="sign-cards-area">
                    <p>Sign Language Cards Display</p>
                </div>
            </div>

        </div>

        <!-- Controls -->
        <div class="control-bar">
            <!-- Camera Toggle -->
            <button id="cam-btn" class="control-btn" title="Toggle Camera">
                <span class="material-icons">videocam</span>
            </button>

            <!-- TTS Toggle -->
            <button id="tts-btn" class="control-btn" title="Toggle Text-to-Speech">
                <span class="material-icons">volume_up</span>
            </button>

            <!-- Language Select -->
            <div style="position: relative; margin: 0 10px;">
                <select id="lang-select" style="
                    background: rgba(255,255,255,0.1); 
                    color: white; 
                    border: 1px solid rgba(255,255,255,0.2); 
                    padding: 10px 15px; 
                    border-radius: 20px; 
                    font-family: 'Inter', sans-serif;
                    cursor: pointer;
                    outline: none;
                ">
                    <option value="ISL" style="background: #1e293b;">ISL (Indian)</option>
                    <option value="ASL" style="background: #1e293b;">ASL (American)</option>
                </select>
            </div>

            <!-- Sign/Voice Mode Toggle -->
            <button id="sign-voice-toggle" class="control-btn" title="Switch between Sign and Voice Mode">
                <span class="material-icons">pan_tool</span>
            </button>
        </div>

    </div>

    <script src="translation.js?v=7"></script>
</body>

</html>
