<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignLink - Live Translation</title>
    <!-- Reusing existing styles -->
    <link rel="stylesheet" href="style.css">
    <!-- Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;800&display=swap"
        rel="stylesheet">

    <!-- specific styles for translation page -->
    <style>
        .translation-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100vw;
            position: relative;
            overflow: auto;
            padding: 20px 20px 110px;
            gap: 18px;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        .translation-main {
            width: min(800px, 96vw);
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
            align-items: stretch;
            margin: 0 auto;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
            transition: background 0.3s;
            z-index: 200;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Video Container (Sign to Text) */
        .video-container {
            width: 100%;
            max-width: none;
            aspect-ratio: 16 / 9;
            position: relative;
            left: -10px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.3);
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain !important;
            transform: scaleX(-1);
            /* Mirror effect */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain !important;
            transform: scaleX(-1);
            pointer-events: none;
        }

        /* Speech to Sign Container */
        .speech-container {
            width: calc(100% - 24px);
            position: absolute;
            bottom: 20px;
            left: 12px;
            display: none;
            flex-direction: column;
            justify-content: flex-start;
            align-items: stretch;
            background: transparent; /* Removed background */
            backdrop-filter: none;    /* Removed blur */
            border: none;             /* Removed border */
            padding: 16px;
            z-index: 150;
        }

        .speech-container.active {
            display: flex;
        }

        .listening-indicator {
            font-size: 1rem;
            color: #3b82f6;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); /* Added shadow for legibility */
        }

        .speech-caption-log {
            flex: 1;
            min-height: 100px;
            max-height: 30vh;
            overflow-y: auto;
            border: none;
            background: transparent; /* Seamless HUD */
            padding: 5px;
            color: #fff;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .speech-caption-line {
            margin-bottom: 8px;
            line-height: 1.35;
            color: #e2e8f0;
            word-break: break-word;
            text-shadow: 0 1px 3px rgba(0,0,0,0.9); /* Added shadow for legibility */
        }

        .sign-cards-area {
            width: 100%;
            max-width: none;
            height: 320px;
            border: none; /* Removed border */
            border-radius: 12px;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            background: transparent; /* Removed background */
            color: rgba(255, 255, 255, 0.3);
            font-size: 1rem;
            overflow-y: auto;
            padding: 10px;
        }

        @media (max-width: 1200px) {
            .video-container {
                left: -6px;
            }
        }

        /* Bottom Result Overlay */
        .result-overlay {
            position: absolute;
            bottom: 75px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.85);
            padding: 15px 30px;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 85%;
            text-align: center;
            z-index: 100;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block; /* Shown by default in sign mode */
        }

        /* Hide entire sign-result HUD in voice mode definitely */
        body.voice-mode-active .result-overlay {
            display: none !important;
        }

        .control-bar {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            bottom: 16px;
            z-index: 210;
        }

        /* Subtitles for Voice Mode - Hidden in favor of HUD captions */
        .voice-subtitles {
            display: none !important;
        }

        /* HUD Live Captions Styling */
        .listening-indicator {
            font-size: 1.1rem;
            color: #3b82f6;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }
        
        #listening-text {
            color: #fff;
            opacity: 0.9;
            font-style: italic;
        }

        body:not(.voice-mode-active) .speech-container {
            display: none !important;
        }

        @media (max-width: 980px) {
            .translation-main {
                width: 96vw;
            }

            .speech-container {
                max-height: 50vh;
            }
        }

        /* ════════════════════════════════════════
           MOBILE — Native App Style (≤600px)
           ════════════════════════════════════════ */
        @media (max-width: 600px) {

            /* Full-screen container — no scroll */
            .translation-container {
                padding: 0;
                gap: 0;
                overflow: hidden;
                height: 100dvh;
                min-height: 100dvh;
                justify-content: flex-start;
                background: #000;
            }

            /* Single-column grid, camera fills all space */
            .translation-main {
                grid-template-columns: 1fr;
                width: 100%;
                flex: 1;
                height: 100%;
                gap: 0;
            }

            /* Camera fills entire screen */
            .video-container {
                left: 0;
                width: 100%;
                height: 100dvh;
                aspect-ratio: unset;
                border-radius: 0;
                border: none;
                box-shadow: none;
            }

            /* Back button: icon-only circle */
            .back-btn {
                top: 14px;
                left: 14px;
                padding: 8px;
                border-radius: 50%;
                gap: 0;
                background: rgba(0, 0, 0, 0.5);
                backdrop-filter: blur(6px);
            }

            .back-btn span:last-child {
                display: none; /* hide "Back to Home" text */
            }

            /* Translation result strip — compact */
            .result-overlay {
                bottom: 80px;
                padding: 10px 18px;
                font-size: 0.95rem;
                max-width: 90%;
                border-radius: 30px;
            }

            /* Control bar — fits in one tight row */
            .control-bar {
                bottom: 12px;
                gap: 8px;
            }

            /* Shrink lang select to be compact */
            #lang-select {
                padding: 8px 10px !important;
                font-size: 0.8rem !important;
                border-radius: 16px !important;
            }

            /* Speech panel: floated overlay contents */
            .speech-container {
                position: absolute;
                bottom: 80px;
                left: 12px;
                right: 12px;
                height: auto;
                max-height: 55dvh;
                min-height: 0;
                border: none;
                background: transparent;
                backdrop-filter: none;
                padding: 14px;
                box-shadow: none;
            }

            .speech-caption-log {
                max-height: 20vh;
                min-height: 80px;
            }

            .sign-cards-area {
                height: 160px;
            }

            /* Spelling overlay: smaller on mobile */
            #spelling-overlay {
                top: 14px !important;
                left: 50% !important;
                transform: translateX(-50%) !important;
                padding: 6px 16px !important;
                border-radius: 8px !important;
            }

            #spelling-text {
                font-size: 1.4rem !important;
                letter-spacing: 3px !important;
            }
        }
</style>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <!-- TF.js for future model integration if needed -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
</head>

<body>

    <a href="index.html" class="back-btn">
        <span class="material-icons">arrow_back</span>
        Back to Home
    </a>

    <div class="translation-container">

        <div class="translation-main">

            <!-- Camera Area -->
            <div id="sign-view" class="video-container">
                <video id="input-video" autoplay playsinline muted></video>
                <canvas id="output-canvas"></canvas>

                <!-- Camera Off Placeholder -->
                <div id="camera-off-placeholder"
                    style="display: none; flex-direction: column; align-items: center; justify-content: center; position: absolute; top:0; left:0; width:100%; height:100%; background: #000; z-index: 10;">
                    <span class="material-icons" style="font-size: 64px; color: #555;">videocam_off</span>
                    <p style="color: #777; margin-top: 10px;">Camera is Off</p>
                </div>

                <div class="result-overlay">
                    <span id="stt-result">Translated Text Will Appear Here...</span>
                </div>

                <!-- Voice Mode Subtitles -->
                <div class="voice-subtitles" id="voice-subtitles"></div>

                <!-- Spelling Overlay (Top Left) -->
                <div id="spelling-overlay" style="
                    position: absolute;
                    top: 20px;
                    left: 20px;
                    background: rgba(0, 0, 0, 0.8);
                    padding: 10px 20px;
                    border-radius: 10px;
                    display: none; /* Hidden by default */
                    z-index: 100;
                    pointer-events: none;
                    ">
                    <span id="spelling-text" style="
                        color: white;
                        font-size: 2rem;
                        font-weight: bold;
                        font-family: 'Outfit', sans-serif;
                        letter-spacing: 2px;
                    "></span>
                </div>

                <!-- Speech Panel (shown in voice mode as overlay) -->
                <div id="speech-panel" class="speech-container">
                    <div class="listening-indicator">
                        <span class="material-icons" style="font-size: 22px;">mic</span>
                        <span id="listening-text">Listening...</span>
                    </div>
                    <div id="speech-caption-log" class="speech-caption-log">
                        <div class="speech-caption-line">Speech captions will appear here.</div>
                    </div>
                    <div class="sign-cards-area">
                        <p>Sign Language Cards Display</p>
                    </div>
                </div>
            </div>

        </div>

        <!-- Controls -->
        <div class="control-bar">
            <!-- Camera Toggle -->
            <button id="cam-btn" class="control-btn" title="Toggle Camera">
                <span class="material-icons">videocam</span>
            </button>

            <!-- TTS Toggle -->
            <button id="tts-btn" class="control-btn" title="Toggle Text-to-Speech">
                <span class="material-icons">volume_up</span>
            </button>

            <!-- Language Select -->
            <div style="position: relative; margin: 0 10px;">
                <select id="lang-select" style="
                    background: rgba(255,255,255,0.1); 
                    color: white; 
                    border: 1px solid rgba(255,255,255,0.2); 
                    padding: 10px 15px; 
                    border-radius: 20px; 
                    font-family: 'Inter', sans-serif;
                    cursor: pointer;
                    outline: none;
                ">
                    <option value="ISL" style="background: #1e293b;">ISL (Indian)</option>
                    <option value="ASL" style="background: #1e293b;">ASL (American)</option>
                </select>
            </div>

            <!-- Sign/Voice Mode Toggle -->
            <button id="sign-voice-toggle" class="control-btn" title="Switch between Sign and Voice Mode">
                <span class="material-icons">pan_tool</span>
            </button>
        </div>

    </div>

    <script src="translation.js?v=7"></script>
</body>

</html>
